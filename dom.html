<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .tabuleiro {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            gap: 10px;
        }

        .celula {
            display: flex;
            background-color: cadetblue;
            width: 100px;
            height: 100px;
            justify-content: center;
            align-items: center;
            font-size: 46px;
            cursor: pointer;
            transition: ease-in .3s;
        }

        .celula:hover {
            background-color: rgba(95, 158, 160, .7);
            border-radius: 20px;
            transition: all .5s;
        }

        .reiniciar {
            margin-top: 20px;
            padding: 20px;
            width: 50vw;
            cursor: pointer;
        }

        .reiniciar:hover {
            background-color: rgb(249, 255, 61);
        }
    </style>
</head>

<body>
    <a href="index.html"><button>INICIO</button></a>

    <h1>Jogo da Velha</h1>
    <div id="tabuleiro-jogo" class="tabuleiro">
        <button class="celula"></button>
        <button class="celula"></button>
        <button class="celula"></button>
        <button class="celula"></button>
        <button class="celula"></button>
        <button class="celula"></button>
        <button class="celula"></button>
        <button class="celula"></button>
        <button class="celula"></button>
    </div>
    <button id="reiniciar" class="reiniciar">Reiniciar</button>


    <script src="dom.js"></script>
</body>

</html>
